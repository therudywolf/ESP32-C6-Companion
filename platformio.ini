; Nocturne C6 — wolf companion for Waveshare ESP32-C6-LCD-1.47 (172x320 ST7789).
; Port of Nocturne OS PC Companion (Heltec ESP32-S3) to color LCD + LLM pet.
;
; Build:   pio run
; Upload:  pio run -t upload    (board on COM8, native USB-Serial/JTAG)
; Monitor: pio device monitor
;
; NOTE: official platform-espressif32 ships Arduino core 2.x with NO ESP32-C6
; support. We pin the pioarduino fork (Arduino 3.x on IDF 5.x, full C6).

[env:nocturne-c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

; ESP32-C6FH4: 4MB in-package flash (product page "FH8" is a typo), no PSRAM.
board_build.flash_size = 4MB
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
board_build.f_cpu = 160000000L

monitor_speed = 115200
monitor_port = COM8
upload_port = COM8
monitor_filters = esp32_exception_decoder, time

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -I include
    -I src
    -Wall

lib_ldf_mode = chain
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    bblanchon/ArduinoJson @ ^7.0.3
    olikraus/U8g2 @ ^2.35.9   ; font data only (Cyrillic); no U8g2 display object
